<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dia Profile Router logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- app-icon rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>

  <!-- routing graph: one source splitting into three profile targets -->
  <g stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M150 256 H210"/>
    <path d="M210 256 C 280 256, 300 150, 362 150"/>
    <path d="M210 256 H362"/>
    <path d="M210 256 C 280 256, 300 362, 362 362"/>
  </g>

  <!-- source node -->
  <circle cx="150" cy="256" r="34" fill="#FFFFFF"/>

  <!-- profile target nodes (distinct colors = distinct profiles) -->
  <circle cx="362" cy="150" r="30" fill="#38BDF8"/>
  <circle cx="362" cy="256" r="30" fill="#FBBF24"/>
  <circle cx="362" cy="362" r="30" fill="#34D399"/>
</svg>
